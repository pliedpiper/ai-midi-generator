<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI MIDI Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              surface: {
                900: '#121212',
                800: '#1a1a1a',
                700: '#242424',
                600: '#2e2e2e',
                500: '#383838',
              },
              text: {
                primary: '#e5e5e5',
                secondary: '#a3a3a3',
                muted: '#6b6b6b',
              },
              accent: {
                DEFAULT: '#d4a574',
                hover: '#e0b88a',
                muted: 'rgba(212, 165, 116, 0.15)',
              }
            },
            fontFamily: {
              mono: ['JetBrains Mono', 'monospace'],
              sans: ['Outfit', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Outfit', sans-serif;
        background-color: #121212;
        color: #e5e5e5;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #1a1a1a;
      }
      ::-webkit-scrollbar-thumb {
        background: #383838;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #4a4a4a;
      }

      /* Range slider styling */
      input[type="range"] {
        -webkit-appearance: none;
        background: transparent;
      }
      input[type="range"]::-webkit-slider-track {
        height: 4px;
        background: #6b6b6b;
        border-radius: 2px;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        background: #d4a574;
        border-radius: 50%;
        margin-top: -6px;
        cursor: pointer;
        transition: transform 0.15s ease;
      }
      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.15);
      }

      /* Focus states */
      *:focus-visible {
        outline: 1px solid #d4a574;
        outline-offset: 2px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "openai": "https://esm.sh/openai@^4.28.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "tone": "https://esm.sh/tone@^15.1.22",
    "@tonejs/midi": "https://esm.sh/@tonejs/midi@^2.0.28"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
